upstream simandaya_backend {
    server 127.0.0.1:2385;
    keepalive 32;
}

upstream simandaya_frontend {
    server 127.0.0.1:4923;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Block API docs in production
    location ~* ^/(docs|redoc|openapi\.json) {
        return 404;
    }

    # WebSocket → desktop pubsub (must be before /api/ block)
    location /api/desktop/pubsub {
        proxy_pass         http://simandaya_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # API → FastAPI backend
    location /api/ {
        proxy_pass         http://simandaya_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # Frontend → Next.js (handles HMR ws in dev, SSR in prod)
    location / {
        proxy_pass         http://simandaya_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
