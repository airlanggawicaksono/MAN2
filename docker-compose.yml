services:
  # PostgreSQL Database
  postgres-db:
    image: postgres:16-alpine
    container_name: simandaya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-simandaya}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-simandaya_dev_password}
      POSTGRES_DB: ${DB_NAME:-simandaya_db}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-4623}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - simandaya-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-simandaya} -d ${DB_NAME:-simandaya_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simandaya-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-2385}
      APP_RELOAD: ${APP_RELOAD:-true}
      DEV_MODE: ${DEV_MODE:-false}
      DB_USER: ${DB_USER:-simandaya}
      DB_PASSWORD: ${DB_PASSWORD:-simandaya_dev_password}
      DB_NAME: ${DB_NAME:-simandaya_db}
      DB_HOST: postgres-db
      DB_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-minimum-32-characters}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refresh_token}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAMESITE: ${JWT_REFRESH_COOKIE_SAMESITE:-lax}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      DESKTOP_API_KEY: ${DESKTOP_API_KEY:-your-desktop-api-key-change-this}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin123}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-1qaz3edc2wsx4rfv}
    ports:
      - "${BACKEND_EXTERNAL_PORT:-2385}:${APP_PORT:-2385}"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - simandaya-network
    volumes:
      - ./backend:/app
    # APP_RELOAD controls --reload (dev) vs --workers 2 (prod)
    command: >
      sh -c "
        if [ \"$$APP_RELOAD\" = \"true\" ]; then
          uvicorn app.main:app --host $$APP_HOST --port $$APP_PORT --reload
        else
          uvicorn app.main:app --host $$APP_HOST --port $$APP_PORT --workers 2
        fi
      "

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${FRONTEND_TARGET:-deps}
    container_name: simandaya-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:2385}
      NODE_ENV: ${NODE_ENV:-development}
      CI: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "300"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-4923}:3000"
    depends_on:
      - backend
    networks:
      - simandaya-network
    # Whole public mounted live from host. CMS uploads + static assets all editable on disk.
    volumes:
      - ./frontend/public:/app/public

networks:
  simandaya-network:
    driver: bridge

volumes:
  postgres_data:
